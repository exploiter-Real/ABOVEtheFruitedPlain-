name: Eternal Engine Daily Pulse
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Upgraded to 3.11 to stop those warnings

      - name: Install AI Library
        run: pip install -U google-genai # This is the "Engine Upgrade"

      - name: Run Eternal Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python eternal_engine.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "✨ Eternal Engine: Daily Event Update"
          
