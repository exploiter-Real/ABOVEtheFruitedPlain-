<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOVEtheFruitedPlain- | KERNEL ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1 id="mainLogo">ABOVEtheFruitedPlain-</h1>
        <div id="statusText">LINKING TO DATABASE...</div>
    </header>

    <section id="playerSection" style="display: none;">
        <div class="player-container">
            <iframe id="gameFrame" src="" frameborder="0" allowfullscreen></iframe>
            <button onclick="document.getElementById('playerSection').style.display='none'" class="close-btn">TERMINATE SESSION</button>
        </div>
    </section>

    <!-- THE ETERNAL ENGINE INJECTS UPDATES BELOW THIS LINE -->
    <!-- EVENT_START -->

    <main id="gameGrid">
        <div class="loading-msg">SCANNING NODES...</div>
    </main>

    <section id="chatSection">
        <div class="chat-header">
            <h2>LOBBY_CHAT</h2>
            <span id="channelIndicator">[ CHANNEL: GENERAL ]</span>
        </div>
        
        <div id="chatMessages"></div>

        <div class="chat-input-area">
            <input type="text" id="chatUsername" placeholder="ID">
            <input type="text" id="chatInput" placeholder="ENTER MESSAGE..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="chatSendBtn" onclick="sendMessage()">SEND</button>
        </div>
    </section>

    <video id="stealthPlayer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000;"></video>

    <script src="Backup.js"></script>
    <script src="script.js"></script>
</body>
</html>
