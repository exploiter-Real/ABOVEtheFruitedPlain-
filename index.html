<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITETRIO ARCADE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
</head>
<body>
    <header>
        <h1 class="logo-glow">ELITETRIO</h1>
        <p class="tagline">SINGULARITY ENGINE V33</p>
        <div class="status-row">
            <div id="statusPill">
                <span id="statusDot" class="dot"></span>
                <span id="statusText">Waking system...</span>
            </div>
            <button id="retryBtn" onclick="window.retryConnection()">RETRY</button>
        </div>
    </header>

    <section id="playerSection">
        <div class="player-header">
            <h2 id="playerTitle">NOW PLAYING</h2>
            <button class="close-btn" onclick="window.closePlayer()">CLOSE</button>
        </div>
        <div class="iframe-container">
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </section>

    <div id="filterBar"></div>

    <div id="recentBar">
        <span class="recent-label">RECENT:</span>
        <div id="recentChips"></div>
    </div>

    <div id="searchWrap">
        <div class="search-inner">
            <span class="search-icon">🔍</span>
            <input type="text" id="gameSearch" placeholder="Search logic streams...">
        </div>
    </div>

    <main id="gameGrid">
        <p class="loading-msg">INITIALIZING DATABASE...</p>
    </main>

    <section id="chatSection">
        <div class="chat-panel">
            <div class="chat-header">
                <span class="chat-title">LOBBY_CHAT</span>
                <div class="chat-header-right">
                    <div id="onlineCount">0 online</div>
                    <div class="chat-live-badge">● LIVE</div>
                </div>
            </div>
            <div class="chat-feed-wrap">
                <div id="chatMessages"></div>
            </div>
            <div class="chat-input-area">
                <div class="chat-username-row">
                    <span class="chat-username-label">USER:</span>
                    <input type="text" id="chatUsername" placeholder="Guest" maxlength="15">
                </div>
                <div class="chat-send-row">
                    <input type="text" id="chatInput" placeholder="Send message..." onkeydown="window.chatKeyHandler(event)">
                    <button id="chatSendBtn" onclick="window.sendMessage()">SEND</button>
                </div>
            </div>
        </div>
    </section>

    <footer>&copy; 2026 ELITETRIO ARCADE // KERNEL_V33</footer>

    <script src="Backup.js"></script>
    <script src="script.js"></script>
</body>
</html>
