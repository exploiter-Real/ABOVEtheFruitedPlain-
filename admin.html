<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KERNEL_V33 ADMIN</title>
    <style>
        body { background: #050505; color: #00f0ff; font-family: 'Orbitron', sans-serif; padding: 50px; }
        .panel { border: 2px solid #00f0ff; padding: 30px; max-width: 500px; margin: auto; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; }
        button { width: 100%; padding: 15px; background: #00f0ff; color: #000; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .hidden { display: none; }
        #status { text-align: center; font-size: 0.8rem; margin-top: 10px; color: #ff00c8; }
    </style>
</head>
<body>
    <div class="panel">
        <div id="loginBox">
            <h2>ADMIN_AUTH</h2>
            <input id="username" type="password" placeholder="Passkey">
            <button onclick="auth()">LOGIN</button>
        </div>
        <div id="controls" class="hidden">
            <h2>LIVE_OVERRIDE</h2>
            <button onclick="setEffect('rainbow')">RAINBOW_MODE</button>
            <button onclick="setEffect('shake')">SHAKE_UI</button>
            <button onclick="setEffect('none')">RESET_SYSTEM</button>
            <button onclick="location.href='index.html'" style="background:#333; color:#fff">EXIT</button>
        </div>
        <div id="status">WIDGETS_OFFLINE</div>
    </div>

    <script>
        const SB_URL = "https://dleydypvpffeifmdpzqc.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsZXlkeXB2cGZmZWlmbWRwenFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc5ODUsImV4cCI6MjA5MjA5Mzk4NX0.gnI03TZkpBT7r5OIwlTKsd7bwovQYAfwRfykhnq5fjY";

        function auth() {
            if(document.getElementById("username").value === "EliteTrio") {
                document.getElementById("loginBox").classList.add("hidden");
                document.getElementById("controls").classList.remove("hidden");
                document.getElementById("status").innerText = "AUTH_SUCCESS";
            }
        }

        async function setEffect(cmd) {
            document.getElementById("status").innerText = "SYNCING_" + cmd.toUpperCase();
            await fetch(`${SB_URL}/rest/v1/live_effects`, {
                method: "POST",
                headers: {
                    "apikey": SB_KEY,
                    "Authorization": `Bearer ${SB_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify([{ command: cmd, active: true }])
            });
            document.getElementById("status").innerText = "SYSTEM_UPDATED";
        }
    </script>
</body>
</html>
