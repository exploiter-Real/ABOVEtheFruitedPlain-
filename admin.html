<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
padding:30px;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
}

.wrap{
max-width:800px;
margin:auto;
background:#1b1b1b;
padding:25px;
border-radius:14px;
}

input,button{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.hidden{
display:none;
}

.section{
margin-top:25px;
padding-top:15px;
border-top:1px solid #333;
}

#status{
margin-top:10px;
color:#aaa;
}
</style>
</head>
<body>

<div class="wrap">

<h1>Admin Panel</h1>

<div id="loginBox">

<input id="username" placeholder="Username">

<button id="loginBtn" type="button">Login</button>

<div id="status">Waiting...</div>

</div>

<div id="panel" class="hidden">

<h2>Owner Controls</h2>

<div class="section">
<h3>Live Effects</h3>

<div class="grid">
<button onclick="setEffect('rainbow')">Rainbow</button>
<button onclick="setEffect('dark')">Dark</button>
<button onclick="setEffect('shake')">Shake</button>
<button onclick="setEffect('none')">Reset</button>
</div>

</div>

<div class="section">
<button onclick="location.href='index.html'">
Back To Site
</button>
</div>

</div>

</div>

<script>
window.onload = function(){

const btn =
document.getElementById("loginBtn");

const statusEl =
document.getElementById("status");

const loginBox =
document.getElementById("loginBox");

const panel =
document.getElementById("panel");

btn.onclick = function(){

const name =
document.getElementById("username")
.value
.trim();

if(name === "EliteTrio"){

statusEl.innerText =
"Access granted";

loginBox.classList.add("hidden");

panel.classList.remove("hidden");

}else{

statusEl.innerText =
"Denied";

}

};

};

function setEffect(cmd){

fetch(
"https://dleydypvpffeifmdpzqc.supabase.co/rest/v1/live_effects",
{
method:"POST",
headers:{
"apikey":"sb_publishable_8Y8H1WhpJhp3A4kyF6P6hQ_JvQk5IVU",
"Authorization":"Bearer sb_publishable_8Y8H1WhpJhp3A4kyF6P6hQ_JvQk5IVU",
"Content-Type":"application/json",
"Prefer":"return=minimal"
},
body:JSON.stringify([
{
command:cmd,
active:true
}
])
}
).then(() => {
alert("Effect sent: " + cmd);
});

}
</script>

</body>
</html>
